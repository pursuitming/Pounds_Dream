server {
    listen 80;
    # 生产环境：使用 _ 匹配所有域名，或填入实际域名如 example.com
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ========== 安全配置 ==========
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ========== 静态资源 ==========
    # Vue Router history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（JS/CSS/图片/字体）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件（直接从 volume 读取，无需代理到后端）
    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ========== API 反向代理 ==========
    location /api/ {
        proxy_pass http://pounds-server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # 上传文件大小限制
        client_max_body_size 10m;
    }

    # ========== API 文档（生产环境建议关闭或限制 IP）==========
    # 如需开启 Swagger 文档访问，取消下面注释
    # location /doc.html {
    #     proxy_pass http://pounds-server:8080/doc.html;
    #     proxy_set_header Host $host;
    #     # 限制只允许内网访问
    #     # allow 10.0.0.0/8;
    #     # allow 172.16.0.0/12;
    #     # allow 192.168.0.0/16;
    #     # deny all;
    # }
    # location /webjars/ {
    #     proxy_pass http://pounds-server:8080/webjars/;
    # }
    # location /v3/api-docs {
    #     proxy_pass http://pounds-server:8080/v3/api-docs;
    # }

    # ========== 错误页面 ==========
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

