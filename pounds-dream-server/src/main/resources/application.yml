server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pounds_dream?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:poundsdream2026secretkeyforjwttokenpleasechangeinproduction}
  expiration: 7200000
  refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

ai:
  api-key: ${AI_API_KEY:tp-cg70cyra0szne3efyqff8xj9gtuv2v9y04x3sznhybjti0xm}
  base-url: ${AI_BASE_URL:https://token-plan-cn.xiaomimimo.com/anthropic}
  model: ${AI_MODEL:mimo-v2.5-pro}

logging:
  level:
    com.poundsdream: debug
